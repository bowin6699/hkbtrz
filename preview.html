<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投融资部信息智能化平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a84c;
  --gold-light: #e8d08a;
  --gold-dark: #a8882e;
  --navy: #0b1629;
  --navy-80: rgba(11, 22, 41, 0.85);
  --navy-60: rgba(11, 22, 41, 0.6);
  --bg: #f0f2f6;
  --card: #ffffff;
  --text: #1a1a2e;
  --text-secondary: #6b7280;
  --text-muted: #9ca3af;
  --border: #e5e7eb;
  --success: #10b981;
  --error: #ef4444;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND IMAGE ── */
.bg-image {
  position: fixed;
  inset: 0;
  z-index: -1;
  overflow: hidden;
}
.bg-image img {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100vh;
  height: 100vw;
  transform: translate(-50%, -50%) rotate(-90deg);
  object-fit: cover;
}
.bg-image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(11, 22, 41, 0.55) 0%, rgba(11, 22, 41, 0.3) 50%, rgba(11, 22, 41, 0.55) 100%);
}

/* ── Login / Register ── */
.auth-page {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  padding: 20px;
  position: fixed;
  top: 0;
  left: 0;
  overflow: hidden;
}

.auth-card {
  position: relative;
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 44px 36px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  animation: cardSlideUp 0.6s ease-out;
  border: 1px solid rgba(201, 168, 76, 0.15);
}

@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-card::before {
  content: '';
  position: absolute;
  top: 0; left: 36px; right: 36px;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
  border-radius: 0 0 3px 3px;
}

.auth-card h2 {
  font-family: 'Noto Serif SC', serif;
  text-align: center;
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--navy);
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}

.auth-card .subtitle {
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 28px;
}

.auth-card label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 5px;
  color: var(--text-secondary);
  letter-spacing: 0.3px;
}

.auth-card input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-family: 'Inter', sans-serif;
  margin-bottom: 16px;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.auth-card input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.15);
}

.auth-card .btn-primary {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, #0b1629, #1a2d53);
  color: #fff;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 16px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 2px;
  position: relative;
  overflow: hidden;
}

.auth-card .btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(11, 22, 41, 0.3);
}

.auth-card .btn-primary::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(201, 168, 76, 0.15) 100%);
  pointer-events: none;
}

.auth-card .switch {
  text-align: center;
  margin-top: 18px;
  font-size: 0.85rem;
  color: var(--text-muted);
}

.auth-card .switch a {
  color: var(--gold-dark);
  cursor: pointer;
  text-decoration: none;
  font-weight: 600;
  transition: color var(--transition);
}

.auth-card .switch a:hover { color: var(--gold); }

.auth-card .error {
  color: var(--error);
  font-size: 0.82rem;
  text-align: center;
  margin-bottom: 12px;
  min-height: 22px;
  line-height: 1.4;
}

.auth-card .success {
  color: var(--success);
  font-size: 0.82rem;
  text-align: center;
  margin-bottom: 12px;
}

/* ── Header ── */
.header {
  background: rgba(11, 22, 41, 0.92);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: #fff;
  padding: 0 24px;
  display: flex;
  align-items: center;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 2px solid var(--gold);
}

.header h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem;
  font-weight: 700;
  letter-spacing: 1px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  color: #f0ede5;
}

.header .user-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.82rem;
  margin-left: auto;
}

.header .user-bar .user-name {
  color: rgba(255,255,255,0.8);
  font-weight: 500;
  padding: 0 8px;
}

.header .user-bar button {
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.9);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.78rem;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
  transition: all var(--transition);
}

.header .user-bar button:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.25);
}

.header .user-bar .admin-badge {
  background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
  color: var(--navy);
  padding: 3px 10px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 0.68rem;
  letter-spacing: 0.5px;
}

/* ── Main content ── */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 24px 16px 40px;
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.page { display: none; }
.page.active { display: block; }
.auth-page.page.active { display: flex; }

/* ── PAGE CONTAINER (for background) ── */
.page-container {
  position: relative;
  min-height: calc(100vh - 60px);
}

.page-container::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(135deg, rgba(11, 22, 41, 0.7) 0%, rgba(11, 22, 41, 0.4) 50%, rgba(11, 22, 41, 0.7) 100%);
}

/* ── Welcome banner ── */
.welcome-banner {
  background: rgba(255, 255, 255, 0.12);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 16px;
  padding: 28px 32px;
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #fff;
  display: flex;
  align-items: center;
  gap: 20px;
}

.welcome-banner .greeting {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.5px;
}

.welcome-banner .greeting-sub {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-top: 4px;
}

.welcome-banner .stats {
  margin-left: auto;
  display: flex;
  gap: 24px;
}

.welcome-banner .stat-item {
  text-align: center;
}

.welcome-banner .stat-item .num {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--gold-light);
}

.welcome-banner .stat-item .label {
  font-size: 0.75rem;
  opacity: 0.6;
  margin-top: 2px;
}

/* ── Search Box ── */
.search-box {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 28px 28px 24px;
  box-shadow: var(--shadow-md);
  margin-bottom: 20px;
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.dir-presets {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  justify-content: center;
}

.dir-preset {
  font-size: 0.85rem;
  padding: 8px 22px;
  background: rgba(240, 242, 246, 0.8);
  color: var(--navy);
  border-radius: 24px;
  cursor: pointer;
  border: 1.5px solid transparent;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  transition: all var(--transition);
}

.dir-preset:hover {
  background: #e8edf5;
  border-color: var(--navy);
}

.dir-preset.active {
  background: var(--navy);
  color: #fff;
  border-color: var(--navy);
  box-shadow: 0 2px 12px rgba(11, 22, 41, 0.25);
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

input, select, button {
  font-size: 15px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  font-family: 'Inter', sans-serif;
}

input:focus, select:focus {
  border-color: var(--gold-dark);
  box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.12);
}

input[type="text"] { flex: 1; min-width: 160px; }
select { background: #fff; cursor: pointer; color: var(--text); }
button { cursor: pointer; transition: all var(--transition); }
button:active { transform: scale(0.97); }

.btn-search {
  background: var(--navy);
  color: #fff;
  border: none;
  font-weight: 600;
  padding: 10px 28px;
  white-space: nowrap;
  letter-spacing: 0.5px;
}

.btn-search:hover {
  background: #152544;
  box-shadow: 0 4px 12px rgba(11, 22, 41, 0.25);
}

/* ── Results ── */
.status {
  text-align: center;
  padding: 40px 20px;
  color: rgba(255,255,255,0.5);
  font-size: 0.9rem;
}

.result-count {
  font-size: 0.85rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 12px;
  padding: 0 4px;
  font-weight: 500;
}

.results { list-style: none; }

.result-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(8px);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  border: 1px solid transparent;
}

.result-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--gold-light);
  transform: translateY(-1px);
}

.icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

.icon.folder { background: #fef3c7; color: #d97706; }
.icon.image { background: #d1fae5; color: #059669; }
.icon.pdf { background: #fee2e2; color: #dc2626; }
.icon.word { background: #dbeafe; color: #2563eb; }
.icon.excel { background: #d1fae5; color: #059669; }

.meta {
  flex: 1;
  min-width: 0;
}

.meta .name {
  font-weight: 600;
  font-size: 0.92rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.meta .info {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 3px;
}

.download-btn {
  background: rgba(11, 22, 41, 0.06);
  color: var(--navy);
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--transition);
}

.download-btn:hover {
  background: rgba(11, 22, 41, 0.1);
}

.preview-btn {
  background: rgba(201, 168, 76, 0.12);
  color: var(--gold-dark);
  padding: 8px 16px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 0.82rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  flex-shrink: 0;
  transition: all var(--transition);
}

.preview-btn:hover {
  background: rgba(201, 168, 76, 0.2);
}

/* ── Modal ── */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(11, 22, 41, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}

.modal-overlay.active { display: flex; }

.modal-box {
  background: var(--card);
  border-radius: 16px;
  width: 92vw;
  height: 88vh;
  max-width: 1000px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  animation: modalIn 0.3s ease-out;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.modal-header .title {
  font-weight: 600;
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  margin-right: 12px;
  color: var(--text);
}

.modal-close-x {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--text-muted);
  padding: 0 4px;
  line-height: 1;
}

.modal-close-x:hover { color: var(--text); }

.modal-body {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 12px;
  background: #f8f9fb;
}

.modal-body img { max-width: 100%; height: auto; border-radius: 8px; }
.modal-body iframe { width: 100%; height: 100%; border: none; min-height: 500px; border-radius: 8px; }

.modal-actions {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  justify-content: flex-end;
}

.modal-dl {
  background: var(--navy);
  color: #fff;
  padding: 9px 24px;
  border-radius: 6px;
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  transition: all var(--transition);
}

.modal-dl:hover { background: #152544; }

/* ── Admin panel ── */
.admin-panel {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.admin-panel h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  margin-bottom: 16px;
  color: var(--navy);
  padding-bottom: 12px;
  border-bottom: 2px solid var(--gold-light);
}

.admin-table {
  width: 100%;
  border-collapse: collapse;
  border-radius: 10px;
  overflow: hidden;
}

.admin-table th {
  background: rgba(240, 242, 246, 0.8);
  padding: 12px 14px;
  text-align: left;
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 600;
  letter-spacing: 0.3px;
}

.admin-table td {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  font-size: 0.85rem;
}

.admin-approve {
  background: var(--success);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  margin-right: 6px;
  transition: all var(--transition);
}

.admin-approve:hover { filter: brightness(1.1); }

.admin-reject {
  background: var(--error);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  transition: all var(--transition);
}

.admin-reject:hover { filter: brightness(1.1); }

.admin-empty { text-align: center; color: var(--text-muted); padding: 40px; }

/* ── Footer ── */
.footer {
  text-align: center;
  padding: 20px;
  color: rgba(255,255,255,0.3);
  font-size: 0.78rem;
}

/* ── Tabs guide ── */
.tab-guide {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  justify-content: center;
}

.tab-guide button {
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  font-size: 0.88rem;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all var(--transition);
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

.tab-guide button:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

.tab-guide button.active {
  background: rgba(201, 168, 76, 0.2);
  color: var(--gold-light);
  border-color: rgba(201, 168, 76, 0.3);
}

/* ── Responsive ── */
@media (max-width: 640px) {
  .auth-card { padding: 32px 24px; }
  .auth-card h2 { font-size: 1.25rem; }
  .header { height: auto; flex-wrap: wrap; padding: 10px 14px; gap: 6px; }
  .header h1 { font-size: 0.85rem; position: static; transform: none; flex: 1; text-align: center; }
  .header .user-bar { width: 100%; justify-content: center; gap: 4px; margin-left: 0; }
  .header .user-bar button { padding: 4px 10px; font-size: 0.7rem; }
  .container { padding: 16px 12px; }
  .search-box { padding: 20px 16px; }
  .dir-presets { gap: 6px; }
  .dir-preset { font-size: 0.78rem; padding: 6px 16px; }
  .result-card { padding: 12px; flex-wrap: wrap; }
  .modal-box { width: 98vw; height: 94vh; }
  .admin-panel { padding: 16px; overflow-x: auto; }
  .welcome-banner { flex-direction: column; text-align: center; padding: 20px; }
  .welcome-banner .stats { margin-left: 0; }
  .tab-guide { flex-wrap: wrap; }
}

/* ── Loading ── */
.btn-search.loading { opacity: 0.7; pointer-events: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c4c4c4; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
</style>
</head>
<body>

<div class="bg-image">
  <img src="/bg.jpg" alt="">
</div>

<!-- ═══════════ LOGIN PAGE ═══════════ -->
<div id="loginPage" class="auth-page page active">
  <div class="auth-card">
    <h2>投融资部信息智能化平台</h2>
    <div class="subtitle">汉口北 · 金融赋能 · 智慧办公</div>
    <div class="error" id="loginError"></div>
    <label>账号</label>
    <input type="text" id="loginUsername" placeholder="请输入账号" autocomplete="username">
    <label>密码</label>
    <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
    <button class="btn-primary" onclick="doLogin()">登 录</button>
    <div class="switch">还没有账号？<a onclick="showPage('registerPage')">申请注册</a></div>
  </div>
</div>

<!-- ═══════════ REGISTER PAGE ═══════════ -->
<div id="registerPage" class="auth-page page">
  <div class="auth-card">
    <h2>申请注册账号</h2>
    <div class="subtitle">提交后需等待管理员审核</div>
    <div class="error" id="regError"></div>
    <div class="success" id="regSuccess"></div>
    <label>账号</label>

  var u = document.getElementById('loginUsername').value.trim();

    showMainApp();
    return;

  if (!u || !p) { errEl.textContent = '请输入账号和密码'; return; }
  fetch(API + '/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  })
  .then(function(r) { return r.json().then(function(d) { return { status: r.status, body: d }; }); })
  .then(function(r) {
    if (r.status !== 200) { errEl.textContent = r.body.detail || '登录失败'; return; }

    currentUser = { username: r.body.username, role: r.body.role, name: r.body.name };
    localStorage.setItem('token', token);
    showMainApp();
  })
  .catch(function(e) { errEl.textContent = '网络错误'; });
}

var searchInput = document.getElementById('searchInput');
var typeSelect = document.getElementById('typeSelect');
var resultsEl = document.getElementById('results');
var statusEl = document.getElementById('status');
var resultCountEl = document.getElementById('resultCount');
var currentDir = '/data/汉口北工作/证照/E2';

function setDir(path, btn) {
  currentDir = path;
  document.querySelectorAll('.dir-preset').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  searchInput.focus();
}

function enterFolder(path) {
  currentDir = path;
  document.querySelectorAll('.dir-preset').forEach(function(b) { b.classList.remove('active'); });
  doSearch();
}

searchInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });

function doSearch() {
  var dir = currentDir;
  var keyword = searchInput.value.trim();
  var type = typeSelect.value;
  if (MOCK_MODE) {
    resultsEl.innerHTML = '';
    resultCountEl.style.display = 'none';
    statusEl.style.display = 'block';
    statusEl.textContent = '🔍 搜索中...';
    document.querySelector('.btn-search').classList.add('loading');
    setTimeout(function() {
      document.querySelector('.btn-search').classList.remove('loading');
      var filtered = mockFiles.filter(function(item) {
        if (type !== 'all' && item.type !== type) return false;
        if (keyword && item.name.toLowerCase().indexOf(keyword.toLowerCase()) === -1) return false;
        return true;
      });
      statusEl.style.display = 'none';
      if (filtered.length === 0) {
        statusEl.style.display = 'block';
        statusEl.textContent = keyword ? '📭 没有找到匹配的文件' : '📂 请输入关键词搜索';
        return;
      }
      resultCountEl.style.display = 'block';
      resultCountEl.textContent = '📋 找到 ' + filtered.length + ' 个结果';
      filtered.forEach(function(item) {
        var li = document.createElement('li');
        li.className = 'result-card';
        li.innerHTML =
          '<div class="icon ' + item.type + '">' + item.icon + '</div>' +
          '<div class="meta">' +
            '<div class="name" title="' + escHtml(item.name) + '">' + escHtml(item.name) + '</div>' +
            '<div class="info">' + escHtml(item.size) + ' · ' + escHtml(item.modified) + '</div>' +
          '</div>' +
          (item.type !== 'folder'
            ? '<button class="preview-btn" onclick="openPreview(\'' + escJs(item.path) + '\',\'' + escJs(item.name) + '\',\'' + item.type + '\')">预览</button>' +
              '<a class="download-btn" href="#">下载</a>'
            : '<button class="preview-btn" onclick="enterFolder(\'' + escJs(item.path) + '\')">进入</button>');
        resultsEl.appendChild(li);
      });
    }, 500);
    return;
  }
  resultsEl.innerHTML = '';
  resultCountEl.style.display = 'none';
  statusEl.style.display = 'block';
  statusEl.textContent = '搜索中...';
  var params = new URLSearchParams({ dir: dir, type: type });
  if (keyword) params.set('q', keyword);
  fetch(API + '/api/search?' + params.toString(), { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      statusEl.style.display = 'none';
      if (data.results.length === 0) { resultCountEl.style.display = 'none'; statusEl.style.display = 'block'; statusEl.textContent = keyword ? '没有找到匹配的文件' : '请输入关键词搜索'; return; }
      resultCountEl.style.display = 'block';
      resultCountEl.textContent = '找到 ' + data.total + ' 个结果' + (data.total > 2000 ? '（仅显示前 2000 条）' : '');
      data.results.forEach(function(item) {
        var li = document.createElement('li');
        li.className = 'result-card';
        var iconEmoji = item.type === 'folder' ? '📁' : item.type === 'image' ? '🖼️' : item.type === 'pdf' ? '📄' : item.type === 'word' ? '📝' : '📊';
        li.innerHTML =
          '<div class="icon ' + item.type + '">' + iconEmoji + '</div>' +
          '<div class="meta">' +
            '<div class="name" title="' + escHtml(item.name) + '">' + escHtml(item.name) + '</div>' +
            '<div class="info">' + escHtml(item.size) + ' · ' + escHtml(item.modified) + '</div>' +
          '</div>' +
          (item.type !== 'folder'
            ? '<button class="preview-btn" onclick="openPreview(\'' + escJs(item.path) + '\',\'' + escJs(item.name) + '\',\'' + escJs(item.type) + '\')">预览</button>' +
              '<a class="download-btn" href="' + API + '/api/download?path=' + encodeURIComponent(item.path) + '" download>下载</a>'
            : '<button class="preview-btn" onclick="enterFolder(\'' + escJs(item.path) + '\')">进入</button>');
        resultsEl.appendChild(li);
      });
    })
    .catch(function() { statusEl.style.display = 'block'; statusEl.textContent = '搜索出错'; });
}

function openPreview(path, name, type) {
  document.getElementById('modalTitle').textContent = name;
  var body = document.getElementById('modalBody');
  body.innerHTML = '';
  if (MOCK_MODE) {
    if (type === 'image') {
      body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6b7280"><div style="font-size:72px;margin-bottom:20px">🖼️</div><div style="font-size:1.1rem;font-weight:600">' + escHtml(name) + '</div><div style="font-size:0.85rem;margin-top:10px;color:#9ca3af">实际部署后将展示文件内容</div></div>';
    } else {
      body.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#6b7280"><div style="font-size:72px;margin-bottom:20px">📄</div><div style="font-size:1.1rem;font-weight:600">' + escHtml(name) + '</div><div style="font-size:0.85rem;margin-top:10px;color:#9ca3af">实际部署后将展示文件内容</div></div>';
    }
    document.getElementById('modalDownload').href = '#';
    document.getElementById('modalOverlay').classList.add('active');
    return;
  }
  var previewUrl = API + '/api/preview?path=' + encodeURIComponent(path);
  if (type === 'image') { var img = document.createElement('img'); img.src = previewUrl; img.alt = name; body.appendChild(img); }
  else { var iframe = document.createElement('iframe'); iframe.src = previewUrl; body.appendChild(iframe); }
  document.getElementById('modalDownload').href = API + '/api/download?path=' + encodeURIComponent(path);
  document.getElementById('modalOverlay').classList.add('active');
}

function closePreview() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('modalBody').innerHTML = '';
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escJs(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

document.getElementById('loginPassword').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
document.getElementById('regDept').addEventListener('keydown', function(e) { if (e.key === 'Enter') doRegister(); });
</script>
</body>
